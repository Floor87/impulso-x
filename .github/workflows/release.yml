name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-release
  cancel-in-progress: false

env:
  VERCEL_CLI_VERSION: 50.28.0
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  quality:
    name: Release quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test

  database:
    name: Release database gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.101.0
      - run: supabase start
      - run: supabase db reset --local
      - run: supabase test db
      - run: supabase db lint --local --level error

  candidate:
    name: Build and test production candidate
    needs: [quality, database]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Validate deployment credentials
        run: |
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"
      - name: Pull production configuration
        run: pnpm dlx "vercel@${VERCEL_CLI_VERSION}" pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build production candidate
        run: pnpm dlx "vercel@${VERCEL_CLI_VERSION}" build --prod --token="$VERCEL_TOKEN"
      - name: Deploy candidate without production domains
        id: deploy
        run: |
          url="$(pnpm dlx "vercel@${VERCEL_CLI_VERSION}" deploy --prebuilt --prod --skip-domain --archive=tgz --token="$VERCEL_TOKEN")"
          test -n "$url"
          echo "url=$url" >> "$GITHUB_OUTPUT"
      - name: Test deployed candidate
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.deploy.outputs.url }}
        run: pnpm test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
      - name: Publish candidate URL
        run: echo "Candidate ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"

  promote:
    name: Promote approved candidate
    needs: candidate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: ${{ needs.candidate.outputs.url }}
    steps:
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Promote without rebuilding
        run: pnpm dlx "vercel@${VERCEL_CLI_VERSION}" promote "${{ needs.candidate.outputs.url }}" --yes --token="$VERCEL_TOKEN"
      - name: Verify promoted deployment
        run: curl --fail --retry 5 --retry-all-errors --max-time 20 "${{ needs.candidate.outputs.url }}/manifest.webmanifest"
