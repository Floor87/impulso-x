name: Bootstrap lockfile

on:
  push:
    branches: [chore/governance-foundation]
    paths:
      - package.json
      - .github/workflows/bootstrap-lockfile.yml

permissions:
  contents: read

jobs:
  lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --lockfile-only
      - uses: actions/upload-artifact@v4
        with:
          name: pnpm-lock
          path: pnpm-lock.yaml
          if-no-files-found: error
          retention-days: 1
